<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Детекция телевизоров</title>
</head>
<body>

<h2>Загрузка изображения</h2>

<form method="POST" enctype="multipart/form-data">
    <input type="file" name="image" required>
    <button type="submit">Обработать</button>
</form>

{% if count is not none %}
    <h3>Найдено телевизоров: {{ count }}</h3>
    
    <h4>Результат:</h4>
    <img src="{{ url_for('static', filename=image.replace('static/', '')) }}" width="500">
{% endif %}

<a href="/download_excel">
    <button>Скачать Excel отчет</button>
</a>

</body>
</html>
